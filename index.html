<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BalanceFlow – Smart Expense Sharing & Settlement Platform. Effortlessly track expenses, settle debts, and manage shared costs." />
    <meta name="theme-color" content="#1A5C38" />
    <title>BalanceFlow – Smart Expense Sharing</title>
    <!-- Open Graph -->
    <meta property="og:title" content="BalanceFlow – Smart Expense Sharing" />
    <meta property="og:description" content="Track shared expenses and settle debts with ease." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registered successfully:', reg.scope))
            .catch((err) => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
